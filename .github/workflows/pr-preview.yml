name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        if: github.event.action != 'closed'
        uses: actions/checkout@v4

      - name: Stage deploy files
        if: github.event.action != 'closed'
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='node_modules' \
                   --exclude='out' --exclude='desktop' --exclude='electron' \
                   --exclude='scripts' --exclude='.env' \
                   ./ _site/
          # Inject <base> tag so relative asset paths resolve from the repo root,
          # not from the /pr-preview/pr-N/ subdirectory
          sed -i 's|<head>|<head><base href="/Tandemonium/pr-preview/pr-${{ github.event.number }}/">|' _site/index.html

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
