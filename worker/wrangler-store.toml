name = "usersfirst-store"
main = "store.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "usersfirst-store"
database_id = "359f7a9e-75e6-4673-9eae-01c849af61d4"

[vars]
CORS_ORIGINS = "https://games.usersfirst.com,https://tandemonium.jimandi.love"
STORE_URL = "https://games.usersfirst.com"
# Set secrets via: wrangler secret put <NAME> --config wrangler-store.toml
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   JWT_SECRET              (same value as tandemonium-api)

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "usersfirst_store"

# Rate limiting
[[unsafe.bindings]]
name = "CHECKOUT_LIMITER"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 10, period = 60 }
