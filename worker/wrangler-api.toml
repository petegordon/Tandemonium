name = "tandemonium-api"
main = "leaderboard.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "tandemonium-leaderboard"
database_id = "e5d28c62-6e2e-4dd2-aceb-cd8254ac5736"

[vars]
CORS_ORIGIN = "https://tandemonium.jimandi.love"
# Set these secrets via: wrangler secret put GOOGLE_CLIENT_ID / JWT_SECRET

# Rate limiting
[[unsafe.bindings]]
name = "AUTH_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "SCORE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "READ_LIMITER"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 100, period = 60 }
