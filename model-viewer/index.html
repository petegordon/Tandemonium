<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #1a1a2e; font-family: 'Helvetica Neue', Arial, sans-serif;
    color: #ccc;
  }

  #app {
    display: flex; width: 100%; height: 100%;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 280px; min-width: 280px;
    background: #0f0f1a;
    border-right: 1px solid #333;
    display: flex; flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }
  #sidebar.collapsed { display: none; }

  #sidebar-header {
    padding: 12px 16px;
    background: #161625;
    border-bottom: 1px solid #333;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 15px; font-weight: 600; color: #fff;
  }
  #sidebar-header button {
    background: none; border: none; color: #888; font-size: 18px; cursor: pointer;
  }
  #sidebar-header button:hover { color: #fff; }

  /* File browser panel */
  #file-browser {
    border-bottom: 1px solid #333;
    max-height: 40%;
    display: flex; flex-direction: column;
  }
  #file-browser-header {
    padding: 8px 12px; font-size: 11px; text-transform: uppercase;
    color: #888; letter-spacing: 1px;
    background: #111122; position: sticky; top: 0; z-index: 1;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  #browse-btn {
    padding: 2px 8px; font-size: 10px;
    background: #1a2a3a; color: #6af; border: 1px solid #334466;
    border-radius: 3px; cursor: pointer;
  }
  #browse-btn:hover { background: #2a3a4a; }
  #file-list {
    overflow-y: auto; flex: 1;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 12px;
  }
  .file-item {
    padding: 6px 12px; cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .file-item:hover { background: rgba(255,255,255,0.05); }
  .file-item.active { background: rgba(60,120,255,0.2); color: #7ab8ff; }
  .file-format {
    font-size: 9px; padding: 1px 4px; border-radius: 2px;
    text-transform: uppercase; font-weight: 600; flex-shrink: 0;
  }
  .file-format.fbx { background: #2a3a1a; color: #8c6; }
  .file-format.obj { background: #3a2a1a; color: #ca6; }
  .file-format.glb, .file-format.gltf { background: #1a2a3a; color: #6ac; }
  .file-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .file-size { color: #666; font-size: 10px; flex-shrink: 0; }

  /* Model info panel */
  #model-info {
    padding: 10px 12px;
    border-bottom: 1px solid #333;
    font-size: 12px;
    flex-shrink: 0;
  }
  #model-info h3 {
    font-size: 11px; text-transform: uppercase;
    color: #888; letter-spacing: 1px; margin-bottom: 6px;
  }
  .info-row {
    display: flex; justify-content: space-between;
    padding: 2px 0; color: #999;
  }
  .info-row .val { color: #7ab8ff; font-family: monospace; }

  /* Scene tree */
  #scene-tree-container {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    border-bottom: 1px solid #333;
    min-height: 80px;
  }
  #scene-tree-header {
    padding: 8px 12px; font-size: 11px; text-transform: uppercase;
    color: #888; letter-spacing: 1px;
    background: #111122; position: sticky; top: 0; z-index: 1;
  }
  #scene-tree {
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 12px; padding: 4px 0;
  }
  .tree-item {
    padding: 3px 8px; cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
  }
  .tree-item:hover { background: rgba(255,255,255,0.05); }
  .tree-item.highlighted { background: rgba(60,120,255,0.2); color: #7ab8ff; }
  .tree-toggle {
    width: 14px; text-align: center; color: #666;
    cursor: pointer; user-select: none; flex-shrink: 0;
  }
  .tree-toggle:hover { color: #aaa; }
  .tree-icon { flex-shrink: 0; font-size: 11px; }
  .tree-name { overflow: hidden; text-overflow: ellipsis; }
  .tree-children { display: none; }
  .tree-children.open { display: block; }

  /* Animation controls */
  #anim-panel {
    padding: 10px 12px;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
    display: none;
  }
  #anim-panel.visible { display: block; }
  #anim-panel h3 {
    font-size: 11px; text-transform: uppercase;
    color: #888; letter-spacing: 1px; margin-bottom: 8px;
  }
  #anim-clip-select {
    width: 100%; padding: 4px; background: #222; color: #ccc;
    border: 1px solid #444; border-radius: 4px; font-size: 12px;
    margin-bottom: 8px;
  }
  .anim-buttons {
    display: flex; gap: 4px; margin-bottom: 8px;
  }
  .anim-btn {
    flex: 1; padding: 5px; font-size: 12px;
    background: #1a2a3a; color: #6af; border: 1px solid #334466;
    border-radius: 4px; cursor: pointer;
  }
  .anim-btn:hover { background: #2a3a4a; }
  .anim-btn.active { background: #2a4a6a; border-color: #6af; }
  .anim-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; font-size: 11px; color: #999;
  }
  .anim-row label { width: 50px; flex-shrink: 0; }
  .anim-row input[type="range"] { flex: 1; accent-color: #5588ff; }
  .anim-row .val { color: #7ab8ff; font-family: monospace; width: 40px; text-align: right; }

  /* Materials list */
  #materials-panel {
    padding: 10px 12px;
    border-bottom: 1px solid #333;
    max-height: 150px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #materials-panel h3 {
    font-size: 11px; text-transform: uppercase;
    color: #888; letter-spacing: 1px; margin-bottom: 6px;
  }
  .mat-item {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 0; font-size: 12px; color: #999;
  }
  .mat-swatch {
    width: 14px; height: 14px; border-radius: 2px;
    border: 1px solid #555; flex-shrink: 0;
  }

  /* Export button */
  #export-bar {
    padding: 10px 12px;
    background: #111122;
    flex-shrink: 0;
  }
  #export-glb-btn {
    width: 100%; padding: 8px; font-size: 12px;
    background: #1a3a1a; color: #6f6; border: 1px solid #336633;
    border-radius: 4px; cursor: pointer;
  }
  #export-glb-btn:hover { background: #2a4a2a; }
  #export-glb-btn:disabled { opacity: 0.4; cursor: default; }

  /* Viewport */
  #viewport {
    flex: 1; position: relative; overflow: hidden;
  }
  #viewport canvas {
    display: block; width: 100%; height: 100%;
  }

  /* Sidebar toggle */
  #sidebar-toggle {
    position: fixed; top: 12px; left: 12px; z-index: 20;
    width: 36px; height: 36px; border-radius: 6px;
    background: rgba(15,15,26,0.9); color: #ccc;
    border: 1px solid #444; cursor: pointer;
    font-size: 18px; display: none;
    align-items: center; justify-content: center;
  }
  #sidebar-toggle:hover { background: rgba(30,30,50,0.95); }

  /* Loading overlay */
  #loading {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15,15,26,0.9);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    color: #7ab8ff; font-size: 16px; z-index: 30;
  }
  #loading.visible { display: flex; }
  #loading-bar {
    width: 200px; height: 4px; background: #333; border-radius: 2px; overflow: hidden;
  }
  #loading-fill {
    height: 100%; background: #7ab8ff; width: 0%; transition: width 0.2s;
  }

  /* Drag-drop overlay */
  #drop-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15,15,26,0.92);
    display: none; align-items: center; justify-content: center;
    z-index: 25; pointer-events: none;
  }
  #drop-overlay.visible { display: flex; pointer-events: auto; }
  #drop-overlay .drop-inner {
    border: 2px dashed #7ab8ff; border-radius: 16px;
    padding: 40px 60px; color: #7ab8ff; font-size: 18px;
    text-align: center;
  }

  /* Empty state */
  #empty-state {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; color: #555; font-size: 14px;
    pointer-events: none;
  }
  #empty-state .big { font-size: 48px; margin-bottom: 12px; }

  /* Mobile */
  @media (max-width: 768px) {
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 15;
    }
    #sidebar-toggle { display: flex; }
    #sidebar.collapsed + #viewport #sidebar-toggle { left: 12px; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Model Viewer</span>
      <button id="sidebar-close">&times;</button>
    </div>

    <div id="file-browser">
      <div id="file-browser-header">
        <span>Files</span>
        <button id="browse-btn">Browse Folder...</button>
      </div>
      <div id="file-list"></div>
    </div>

    <div id="model-info" style="display:none;">
      <h3>Model Info</h3>
      <div id="info-content"></div>
    </div>

    <div id="scene-tree-container" style="display:none;">
      <div id="scene-tree-header">Scene Graph</div>
      <div id="scene-tree"></div>
    </div>

    <div id="anim-panel">
      <h3>Animation</h3>
      <select id="anim-clip-select"></select>
      <div class="anim-buttons">
        <button class="anim-btn" id="anim-play">Play</button>
        <button class="anim-btn" id="anim-pause">Pause</button>
        <button class="anim-btn" id="anim-stop">Stop</button>
      </div>
      <div class="anim-row">
        <label>Speed</label>
        <input type="range" id="anim-speed" min="0.1" max="3" step="0.1" value="1">
        <span class="val" id="anim-speed-val">1.0x</span>
      </div>
      <div class="anim-row">
        <label>Time</label>
        <input type="range" id="anim-scrub" min="0" max="1" step="0.001" value="0">
        <span class="val" id="anim-time-val">0.0s</span>
      </div>
      <div class="anim-row">
        <label>Loop</label>
        <input type="checkbox" id="anim-loop" checked>
      </div>
    </div>

    <div id="materials-panel" style="display:none;">
      <h3>Materials</h3>
      <div id="materials-list"></div>
    </div>

    <div id="export-bar">
      <button id="export-glb-btn" disabled>Export as GLB</button>
    </div>
  </div>

  <div id="viewport">
    <button id="sidebar-toggle">&#9776;</button>
    <div id="loading">
      <span id="loading-text">Loading...</span>
      <div id="loading-bar"><div id="loading-fill"></div></div>
    </div>
    <div id="drop-overlay">
      <div class="drop-inner">Drop 3D model here<br><small>.fbx .obj .glb .gltf</small></div>
    </div>
    <div id="empty-state">
      <div class="big">&#9649;</div>
      Browse a folder or drag &amp; drop a 3D model<br>
      <small style="color:#444;">Supports FBX, OBJ, GLB, GLTF</small>
    </div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="dir-input" webkitdirectory multiple style="display:none;">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

// ── State ──
let currentModel = null;
let currentFileName = '';
let currentFileSize = 0;
let animMixer = null;
let animActions = [];
let animClips = [];
let activeAction = null;
let isAnimPlaying = false;
let animClock = new THREE.Clock();
const loadedFiles = new Map(); // filename -> File object

// ── DOM refs ──
const viewport = document.getElementById('viewport');
const loadingEl = document.getElementById('loading');
const loadingText = document.getElementById('loading-text');
const loadingFill = document.getElementById('loading-fill');
const emptyState = document.getElementById('empty-state');
const fileListEl = document.getElementById('file-list');
const modelInfoEl = document.getElementById('model-info');
const infoContentEl = document.getElementById('info-content');
const sceneTreeContainer = document.getElementById('scene-tree-container');
const sceneTreeEl = document.getElementById('scene-tree');
const animPanel = document.getElementById('anim-panel');
const materialsPanel = document.getElementById('materials-panel');
const materialsListEl = document.getElementById('materials-list');
const exportBtn = document.getElementById('export-glb-btn');

// ── Three.js Scene Setup ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
viewport.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
camera.position.set(3, 2.5, 4);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1, 0);
controls.update();

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
fillLight.position.set(-4, 3, -5);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffeedd, 0.3);
rimLight.position.set(0, 2, -6);
scene.add(rimLight);

// ── Ground plane ──
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.9, metalness: 0 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ── Grid helper ──
const grid = new THREE.GridHelper(20, 20, 0x333355, 0x222244);
grid.position.y = 0.001;
scene.add(grid);

// ── Resize ──
function resize() {
  const w = viewport.clientWidth, h = viewport.clientHeight;
  if (w === 0 || h === 0) return;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ── Render loop ──
function animate() {
  requestAnimationFrame(animate);
  const delta = animClock.getDelta();
  if (animMixer && isAnimPlaying) {
    animMixer.update(delta);
    updateAnimScrub();
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ══════════════════════════════════════════
// ── File Browser ──
// ══════════════════════════════════════════

const SUPPORTED_EXTS = ['.fbx', '.obj', '.glb', '.gltf'];

function getExt(name) {
  const i = name.lastIndexOf('.');
  return i >= 0 ? name.slice(i).toLowerCase() : '';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function populateFileList(files) {
  loadedFiles.clear();
  fileListEl.innerHTML = '';
  const sorted = Array.from(files).sort((a, b) => a.name.localeCompare(b.name));
  for (const file of sorted) {
    const ext = getExt(file.name);
    if (!SUPPORTED_EXTS.includes(ext)) continue;
    loadedFiles.set(file.name, file);

    const item = document.createElement('div');
    item.className = 'file-item';
    item.dataset.filename = file.name;

    const format = document.createElement('span');
    format.className = 'file-format ' + ext.slice(1);
    format.textContent = ext.slice(1);
    item.appendChild(format);

    const name = document.createElement('span');
    name.className = 'file-name';
    name.textContent = file.name;
    name.title = file.name;
    item.appendChild(name);

    const size = document.createElement('span');
    size.className = 'file-size';
    size.textContent = formatSize(file.size);
    item.appendChild(size);

    item.addEventListener('click', () => loadFileFromBrowser(file));
    fileListEl.appendChild(item);
  }

  if (fileListEl.children.length === 0) {
    fileListEl.innerHTML = '<div style="padding:12px;color:#555;font-size:12px;font-style:italic;">No 3D files found</div>';
  }
}

// Browse directory button
document.getElementById('browse-btn').addEventListener('click', () => {
  document.getElementById('dir-input').click();
});

document.getElementById('dir-input').addEventListener('change', (e) => {
  if (e.target.files.length > 0) {
    populateFileList(e.target.files);
  }
});

// ══════════════════════════════════════════
// ── Model Loading ──
// ══════════════════════════════════════════

function showLoading(text) {
  loadingText.textContent = text || 'Loading...';
  loadingFill.style.width = '0%';
  loadingEl.classList.add('visible');
  emptyState.style.display = 'none';
}

function hideLoading() {
  loadingEl.classList.remove('visible');
}

function setProgress(pct) {
  loadingFill.style.width = Math.min(100, pct).toFixed(0) + '%';
}

function disposeModel() {
  if (!currentModel) return;
  // Stop animations
  if (animMixer) {
    animMixer.stopAllAction();
    animMixer = null;
  }
  animActions = [];
  animClips = [];
  activeAction = null;
  isAnimPlaying = false;

  // Dispose geometry/materials/textures
  currentModel.traverse((child) => {
    if (child.isMesh) {
      child.geometry?.dispose();
      if (Array.isArray(child.material)) {
        child.material.forEach(m => disposeMaterial(m));
      } else if (child.material) {
        disposeMaterial(child.material);
      }
    }
  });
  scene.remove(currentModel);
  currentModel = null;
}

function disposeMaterial(mat) {
  const texProps = ['map', 'normalMap', 'roughnessMap', 'metalnessMap', 'aoMap', 'emissiveMap', 'specularMap', 'bumpMap'];
  for (const key of texProps) {
    if (mat[key]) mat[key].dispose();
  }
  mat.dispose();
}

function loadFileFromBrowser(file) {
  // Highlight active file
  fileListEl.querySelectorAll('.file-item.active').forEach(el => el.classList.remove('active'));
  const itemEl = fileListEl.querySelector(`[data-filename="${CSS.escape(file.name)}"]`);
  if (itemEl) itemEl.classList.add('active');

  showLoading(`Loading ${file.name}...`);
  currentFileName = file.name;
  currentFileSize = file.size;

  const reader = new FileReader();
  reader.onprogress = (e) => {
    if (e.lengthComputable) setProgress((e.loaded / e.total) * 50);
  };
  reader.onload = () => {
    setProgress(50);
    parseFile(file.name, reader.result);
  };
  reader.onerror = () => {
    hideLoading();
    alert('Failed to read file: ' + file.name);
  };
  reader.readAsArrayBuffer(file);
}

function parseFile(filename, arrayBuffer) {
  const ext = getExt(filename);
  try {
    if (ext === '.fbx') {
      const loader = new FBXLoader();
      const result = loader.parse(arrayBuffer);
      onModelLoaded(result, result.animations || []);
    } else if (ext === '.obj') {
      const text = new TextDecoder().decode(arrayBuffer);
      const loader = new OBJLoader();
      const result = loader.parse(text);
      onModelLoaded(result, []);
    } else if (ext === '.glb' || ext === '.gltf') {
      const loader = new GLTFLoader();
      loader.parse(arrayBuffer, '', (gltf) => {
        onModelLoaded(gltf.scene, gltf.animations || []);
      }, (err) => {
        hideLoading();
        alert('Failed to parse ' + filename + ': ' + err.message);
      });
    } else {
      hideLoading();
      alert('Unsupported format: ' + ext);
    }
  } catch (err) {
    hideLoading();
    console.error('Parse error:', err);
    alert('Failed to parse ' + filename + ':\n' + err.message);
  }
}

function onModelLoaded(model, clips) {
  disposeModel();
  setProgress(80);

  // Enable shadows
  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  // Auto-scale and center
  const targetSize = 5;
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  if (maxDim > 0) {
    model.scale.setScalar(targetSize / maxDim);
  }

  scene.add(model);
  model.updateMatrixWorld(true);

  // Precise centering using vertex positions
  let minY = Infinity, maxY = -Infinity;
  let minX = Infinity, maxX = -Infinity;
  let minZ = Infinity, maxZ = -Infinity;
  const v = new THREE.Vector3();
  model.traverse((child) => {
    if (child.isMesh && child.geometry?.attributes?.position) {
      const pos = child.geometry.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        v.fromBufferAttribute(pos, i);
        child.localToWorld(v);
        if (v.y < minY) minY = v.y;
        if (v.y > maxY) maxY = v.y;
        if (v.x < minX) minX = v.x;
        if (v.x > maxX) maxX = v.x;
        if (v.z < minZ) minZ = v.z;
        if (v.z > maxZ) maxZ = v.z;
      }
    }
  });

  if (isFinite(minY)) {
    model.position.y -= minY;
    model.position.x -= (minX + maxX) / 2;
    model.position.z -= (minZ + maxZ) / 2;
    controls.target.set(0, (maxY - minY) / 2, 0);
  } else {
    controls.target.set(0, 1, 0);
  }

  // Fit camera
  const finalBox = new THREE.Box3().setFromObject(model);
  const finalSize = finalBox.getSize(new THREE.Vector3());
  const dist = Math.max(finalSize.x, finalSize.y, finalSize.z) * 1.5;
  camera.position.set(dist * 0.8, dist * 0.6, dist * 0.8);
  controls.update();

  currentModel = model;
  emptyState.style.display = 'none';
  exportBtn.disabled = false;

  // Setup animation
  setupAnimations(model, clips);

  // Build UI panels
  buildModelInfo(model);
  buildSceneTree(model);
  buildMaterialsList(model);

  setProgress(100);
  setTimeout(hideLoading, 200);
}

// ══════════════════════════════════════════
// ── Animation System ──
// ══════════════════════════════════════════

const animClipSelect = document.getElementById('anim-clip-select');
const animSpeedSlider = document.getElementById('anim-speed');
const animSpeedVal = document.getElementById('anim-speed-val');
const animScrub = document.getElementById('anim-scrub');
const animTimeVal = document.getElementById('anim-time-val');
const animLoopCheck = document.getElementById('anim-loop');

function setupAnimations(model, clips) {
  animClips = clips;
  animActions = [];
  activeAction = null;
  isAnimPlaying = false;

  if (clips.length === 0) {
    animPanel.classList.remove('visible');
    return;
  }

  animPanel.classList.add('visible');
  animMixer = new THREE.AnimationMixer(model);

  // Populate clip dropdown
  animClipSelect.innerHTML = '';
  clips.forEach((clip, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = clip.name || `Clip ${i + 1}`;
    animClipSelect.appendChild(opt);
  });

  // Create actions
  animActions = clips.map(clip => animMixer.clipAction(clip));

  // Select first clip
  selectClip(0);
}

function selectClip(index) {
  if (activeAction) {
    activeAction.stop();
  }
  activeAction = animActions[index];
  if (!activeAction) return;

  const clip = animClips[index];
  activeAction.reset();
  activeAction.setLoop(animLoopCheck.checked ? THREE.LoopRepeat : THREE.LoopOnce, Infinity);
  activeAction.clampWhenFinished = true;
  animScrub.max = clip.duration;
  animScrub.value = 0;
  animTimeVal.textContent = '0.0s';

  // Auto-play
  activeAction.play();
  isAnimPlaying = true;
  updateAnimButtons();
}

function updateAnimScrub() {
  if (!activeAction || !animClips[animClipSelect.value]) return;
  const clip = animClips[animClipSelect.value];
  const time = activeAction.time % clip.duration;
  animScrub.value = time;
  animTimeVal.textContent = time.toFixed(1) + 's';
}

function updateAnimButtons() {
  document.getElementById('anim-play').classList.toggle('active', isAnimPlaying);
  document.getElementById('anim-pause').classList.toggle('active', !isAnimPlaying && activeAction?.isRunning());
}

animClipSelect.addEventListener('change', () => selectClip(parseInt(animClipSelect.value)));

document.getElementById('anim-play').addEventListener('click', () => {
  if (!activeAction) return;
  activeAction.paused = false;
  if (!activeAction.isRunning()) activeAction.play();
  isAnimPlaying = true;
  updateAnimButtons();
});

document.getElementById('anim-pause').addEventListener('click', () => {
  if (!activeAction) return;
  activeAction.paused = true;
  isAnimPlaying = false;
  updateAnimButtons();
});

document.getElementById('anim-stop').addEventListener('click', () => {
  if (!activeAction) return;
  activeAction.stop();
  activeAction.reset();
  isAnimPlaying = false;
  updateAnimButtons();
  animScrub.value = 0;
  animTimeVal.textContent = '0.0s';
});

animSpeedSlider.addEventListener('input', () => {
  const speed = parseFloat(animSpeedSlider.value);
  animSpeedVal.textContent = speed.toFixed(1) + 'x';
  if (activeAction) activeAction.setEffectiveTimeScale(speed);
});

animScrub.addEventListener('input', () => {
  if (!activeAction) return;
  const wasPlaying = isAnimPlaying;
  activeAction.paused = true;
  isAnimPlaying = false;
  activeAction.time = parseFloat(animScrub.value);
  animTimeVal.textContent = parseFloat(animScrub.value).toFixed(1) + 's';
  // Force a single mixer update so the pose updates
  if (animMixer) animMixer.update(0);
  if (wasPlaying) {
    activeAction.paused = false;
    isAnimPlaying = true;
  }
});

animLoopCheck.addEventListener('change', () => {
  if (!activeAction) return;
  activeAction.setLoop(animLoopCheck.checked ? THREE.LoopRepeat : THREE.LoopOnce, Infinity);
});

// ══════════════════════════════════════════
// ── Model Info Panel ──
// ══════════════════════════════════════════

function buildModelInfo(model) {
  let vertices = 0, faces = 0, meshCount = 0;
  const materialSet = new Set();

  model.traverse((child) => {
    if (child.isMesh) {
      meshCount++;
      const geo = child.geometry;
      if (geo) {
        vertices += geo.attributes.position ? geo.attributes.position.count : 0;
        faces += geo.index ? geo.index.count / 3 : (geo.attributes.position ? geo.attributes.position.count / 3 : 0);
      }
      if (Array.isArray(child.material)) {
        child.material.forEach(m => materialSet.add(m));
      } else if (child.material) {
        materialSet.add(child.material);
      }
    }
  });

  const rows = [
    ['File', currentFileName],
    ['Size', formatSize(currentFileSize)],
    ['Vertices', vertices.toLocaleString()],
    ['Faces', Math.floor(faces).toLocaleString()],
    ['Meshes', meshCount.toString()],
    ['Materials', materialSet.size.toString()],
    ['Animations', animClips.length.toString()],
  ];

  infoContentEl.innerHTML = rows.map(([label, val]) =>
    `<div class="info-row"><span>${label}</span><span class="val">${val}</span></div>`
  ).join('');

  modelInfoEl.style.display = 'block';
}

// ══════════════════════════════════════════
// ── Scene Tree ──
// ══════════════════════════════════════════

let highlightedNode = null;
const highlightOverlays = new Map();

function buildSceneTree(root) {
  sceneTreeEl.innerHTML = '';
  sceneTreeEl.appendChild(buildTreeNode(root, 0));
  sceneTreeContainer.style.display = 'block';
}

function buildTreeNode(obj, depth) {
  const container = document.createElement('div');
  const item = document.createElement('div');
  item.className = 'tree-item';
  item.style.paddingLeft = (8 + depth * 16) + 'px';

  const toggle = document.createElement('span');
  toggle.className = 'tree-toggle';
  // Filter children to only scene-relevant ones (skip helpers, lights added by us)
  const relevantChildren = obj.children.filter(c => c !== ground && c !== grid && !c.isLight);
  const hasChildren = relevantChildren.length > 0;
  toggle.textContent = hasChildren ? '\u25B6' : ' ';
  item.appendChild(toggle);

  const icon = document.createElement('span');
  icon.className = 'tree-icon';
  if (obj.isMesh) icon.textContent = '\u25A0';
  else if (obj.isGroup || obj.isScene) icon.textContent = '\u25CB';
  else if (obj.isBone) icon.textContent = '\u2662';
  else if (obj.isSkinnedMesh) icon.textContent = '\u25A0';
  else icon.textContent = '\u25C7';
  item.appendChild(icon);

  const name = document.createElement('span');
  name.className = 'tree-name';
  name.textContent = obj.name || `[${obj.type}]`;
  item.appendChild(name);
  container.appendChild(item);

  let childrenEl = null;
  if (hasChildren) {
    childrenEl = document.createElement('div');
    childrenEl.className = 'tree-children';
    for (const child of relevantChildren) {
      childrenEl.appendChild(buildTreeNode(child, depth + 1));
    }
    container.appendChild(childrenEl);
  }

  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!childrenEl) return;
    const open = childrenEl.classList.toggle('open');
    toggle.textContent = open ? '\u25BC' : '\u25B6';
  });

  item.addEventListener('click', (e) => {
    e.stopPropagation();
    highlightNode(obj, item);
  });

  return container;
}

function highlightNode(obj, treeItemEl) {
  // Clear previous
  clearHighlight();

  // Highlight in tree
  sceneTreeEl.querySelectorAll('.tree-item.highlighted').forEach(el => el.classList.remove('highlighted'));
  if (treeItemEl) treeItemEl.classList.add('highlighted');

  // Highlight in 3D
  if (obj.isMesh) {
    addHighlightOverlay(obj);
  } else {
    obj.traverse((child) => {
      if (child.isMesh) addHighlightOverlay(child);
    });
  }
  highlightedNode = obj;
}

function addHighlightOverlay(mesh) {
  const overlay = new THREE.Mesh(
    mesh.geometry,
    new THREE.MeshBasicMaterial({
      color: 0x7ab8ff,
      wireframe: true,
      transparent: true,
      opacity: 0.3,
      depthTest: false,
    })
  );
  overlay.position.copy(mesh.position);
  overlay.rotation.copy(mesh.rotation);
  overlay.scale.copy(mesh.scale);
  overlay.renderOrder = 999;
  mesh.parent?.add(overlay);
  highlightOverlays.set(mesh.uuid, overlay);
}

function clearHighlight() {
  for (const [uuid, overlay] of highlightOverlays) {
    overlay.parent?.remove(overlay);
    overlay.geometry = null; // shared, don't dispose
    overlay.material.dispose();
  }
  highlightOverlays.clear();
  highlightedNode = null;
}

// ══════════════════════════════════════════
// ── Materials List ──
// ══════════════════════════════════════════

function buildMaterialsList(model) {
  const mats = new Map();
  model.traverse((child) => {
    if (child.isMesh) {
      const materials = Array.isArray(child.material) ? child.material : [child.material];
      for (const m of materials) {
        if (m && !mats.has(m.uuid)) {
          mats.set(m.uuid, m);
        }
      }
    }
  });

  materialsListEl.innerHTML = '';
  if (mats.size === 0) {
    materialsPanel.style.display = 'none';
    return;
  }

  materialsPanel.style.display = 'block';
  for (const [uuid, mat] of mats) {
    const item = document.createElement('div');
    item.className = 'mat-item';

    const swatch = document.createElement('div');
    swatch.className = 'mat-swatch';
    const color = mat.color ? '#' + mat.color.getHexString() : '#888888';
    swatch.style.background = color;
    item.appendChild(swatch);

    const name = document.createElement('span');
    name.textContent = mat.name || mat.type || 'Unnamed';
    item.appendChild(name);

    materialsListEl.appendChild(item);
  }
}

// ══════════════════════════════════════════
// ── GLB Export ──
// ══════════════════════════════════════════

exportBtn.addEventListener('click', () => {
  if (!currentModel) return;
  exportBtn.disabled = true;
  exportBtn.textContent = 'Exporting...';

  const exporter = new GLTFExporter();
  const options = { binary: true };
  if (animClips.length > 0) {
    options.animations = animClips;
  }

  exporter.parse(currentModel, (result) => {
    const blob = new Blob([result], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const baseName = currentFileName.replace(/\.[^.]+$/, '');
    a.download = baseName + '.glb';
    a.click();
    URL.revokeObjectURL(url);

    exportBtn.disabled = false;
    exportBtn.textContent = 'Export as GLB';
  }, (err) => {
    console.error('GLB export failed:', err);
    alert('GLB export failed: ' + err.message);
    exportBtn.disabled = false;
    exportBtn.textContent = 'Export as GLB';
  }, options);
});

// ══════════════════════════════════════════
// ── Drag & Drop ──
// ══════════════════════════════════════════

const dropOverlay = document.getElementById('drop-overlay');
let dragCounter = 0;

viewport.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  dropOverlay.classList.add('visible');
});

viewport.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dropOverlay.classList.remove('visible');
  }
});

viewport.addEventListener('dragover', (e) => {
  e.preventDefault();
});

viewport.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('visible');

  const files = e.dataTransfer.files;
  if (files.length === 0) return;

  // If multiple files dropped, add all to file list, load the first 3D one
  const modelFiles = Array.from(files).filter(f => SUPPORTED_EXTS.includes(getExt(f.name)));
  if (modelFiles.length === 0) {
    alert('No supported 3D files found. Supported: .fbx, .obj, .glb, .gltf');
    return;
  }

  // Populate file list with dropped files
  populateFileList(modelFiles);

  // Load the first one
  loadFileFromBrowser(modelFiles[0]);
});

// ══════════════════════════════════════════
// ── Sidebar Toggle ──
// ══════════════════════════════════════════

const sidebar = document.getElementById('sidebar');
const sidebarToggle = document.getElementById('sidebar-toggle');

sidebarToggle.addEventListener('click', () => {
  sidebar.classList.remove('collapsed');
  sidebarToggle.style.display = 'none';
});

document.getElementById('sidebar-close').addEventListener('click', () => {
  sidebar.classList.add('collapsed');
  sidebarToggle.style.display = 'flex';
});

// ══════════════════════════════════════════
// ── Keyboard Shortcuts ──
// ══════════════════════════════════════════

window.addEventListener('keydown', (e) => {
  if (e.key === ' ' && activeAction) {
    e.preventDefault();
    if (isAnimPlaying) {
      activeAction.paused = true;
      isAnimPlaying = false;
    } else {
      activeAction.paused = false;
      if (!activeAction.isRunning()) activeAction.play();
      isAnimPlaying = true;
    }
    updateAnimButtons();
  }
});

</script>
