<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay + P2P Test — Tandemonium</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #1a1a2e;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 24px;
    max-width: 700px;
    margin: 0 auto;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
  section { margin-bottom: 24px; }
  h2 { font-size: 16px; margin-bottom: 8px; color: rgba(255,255,255,0.8); }
  button {
    background: #4a6cf7;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-right: 8px;
    margin-bottom: 8px;
  }
  button:hover { background: #3b5de7; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.danger { background: #e74c3c; }
  button.danger:hover { background: #c0392b; }
  button.success { background: #2ecc71; }
  button.success:hover { background: #27ae60; }
  input {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    width: 140px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
    margin-right: 8px;
  }
  input::placeholder { color: rgba(255,255,255,0.3); letter-spacing: 1px; }
  #log {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.6;
    max-height: 400px;
    overflow-y: auto;
  }
  .room-code {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #4a6cf7;
    margin: 8px 0;
  }
  .status {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    margin: 8px 0;
  }
  .status.disconnected { background: rgba(231,76,60,0.2); color: #e74c3c; }
  .status.connecting { background: rgba(243,156,18,0.2); color: #f39c12; }
  .status.waiting { background: rgba(52,152,219,0.2); color: #3498db; }
  .status.connected { background: rgba(46,204,113,0.2); color: #2ecc71; }
  .status.p2p { background: rgba(155,89,182,0.2); color: #9b59b6; }
  .transport-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    margin-left: 8px;
    text-transform: uppercase;
  }
  .transport-badge.relay { background: rgba(52,152,219,0.2); color: #3498db; }
  .transport-badge.p2p { background: rgba(155,89,182,0.2); color: #9b59b6; }
  .msg-sent { color: #3498db; }
  .msg-recv { color: #2ecc71; }
  .msg-err { color: #e74c3c; }
  .msg-info { color: #f39c12; }
  .msg-p2p { color: #9b59b6; }
  .msg-sys { color: rgba(255,255,255,0.5); }
  .ping-display { font-size: 13px; color: rgba(255,255,255,0.6); margin-left: 12px; }
  a.back { color: rgba(255,255,255,0.5); font-size: 13px; text-decoration: none; }
  a.back:hover { color: #fff; }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
</style>
</head>
<body>
  <a class="back" href=".">&larr; Back to tests</a>
  <h1>Relay + P2P Connection Test</h1>
  <p class="sub">Test room creation, joining, and P2P upgrade (no login required). Use two tabs or devices.</p>

  <section>
    <h2>Create Room (Captain)</h2>
    <div class="row">
      <button id="btn-create">Create Room</button>
      <button id="btn-disconnect-host" class="danger" disabled>Disconnect</button>
    </div>
    <div id="host-room-code"></div>
  </section>

  <section>
    <h2>Join Room (Stoker)</h2>
    <div class="row">
      <input id="join-code" type="text" placeholder="XXXX" maxlength="9" autocomplete="off" spellcheck="false">
      <button id="btn-join">Join</button>
      <button id="btn-disconnect-join" class="danger" disabled>Disconnect</button>
    </div>
  </section>

  <section>
    <h2>Status <span id="status" class="status disconnected">Disconnected</span><span id="transport"></span><span id="ping" class="ping-display"></span></h2>
    <div class="row">
      <button id="btn-send" disabled>Send Test Message</button>
      <button id="btn-p2p" class="success" disabled>Upgrade to P2P</button>
      <button id="btn-clear">Clear Log</button>
    </div>
  </section>

  <section>
    <h2>Log</h2>
    <div id="log"></div>
  </section>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script type="module">
  import {
    RELAY_URL, TURN_CREDENTIALS_URL, MSG_HEARTBEAT,
    PEERJS_HOST, PEERJS_PORT, PEERJS_PATH, PEERJS_SECURE
  } from '../js/config.js';

  const logEl = document.getElementById('log');
  const statusEl = document.getElementById('status');
  const transportEl = document.getElementById('transport');
  const pingEl = document.getElementById('ping');
  const btnCreate = document.getElementById('btn-create');
  const btnJoin = document.getElementById('btn-join');
  const btnSend = document.getElementById('btn-send');
  const btnP2P = document.getElementById('btn-p2p');
  const btnClear = document.getElementById('btn-clear');
  const btnDisconnectHost = document.getElementById('btn-disconnect-host');
  const btnDisconnectJoin = document.getElementById('btn-disconnect-join');
  const joinCodeInput = document.getElementById('join-code');
  const hostRoomCode = document.getElementById('host-room-code');

  let ws = null;
  let peer = null;
  let p2pConn = null;
  let role = null;
  let roomCode = null;
  let transport = 'none'; // 'relay' | 'p2p' | 'none'
  let heartbeatInterval = null;
  let lastPingTime = 0;
  let msgCount = 0;
  let partnerConnected = false;

  function log(msg, cls = 'msg-sys') {
    const time = new Date().toLocaleTimeString('en-US', { hour12: false, fractionalSecondDigits: 1 });
    logEl.innerHTML += `<span class="${cls}">[${time}] ${escapeHtml(msg)}</span>\n`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status ' + cls;
  }

  function setTransport(t) {
    transport = t;
    if (t === 'relay') {
      transportEl.innerHTML = '<span class="transport-badge relay">RELAY</span>';
    } else if (t === 'p2p') {
      transportEl.innerHTML = '<span class="transport-badge p2p">P2P</span>';
    } else {
      transportEl.innerHTML = '';
    }
  }

  function generateRoomCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = 'TNDM-';
    for (let i = 0; i < 4; i++) {
      code += chars[Math.floor(Math.random() * chars.length)];
    }
    return code;
  }

  // ── Send via current transport ──────────────────────────────
  function send(data) {
    if (transport === 'p2p' && p2pConn && p2pConn.open) {
      try { p2pConn.send(data); return true; } catch (_) {}
    }
    if (ws && ws.readyState === WebSocket.OPEN) {
      try { ws.send(data); return true; } catch (_) {}
    }
    return false;
  }

  // ── Relay WebSocket ─────────────────────────────────────────
  function connectRelay(code, asRole) {
    disconnectAll();
    roomCode = code;
    role = asRole;
    partnerConnected = false;

    const url = `${RELAY_URL}?room=${code}&role=${role}`;
    log(`Connecting to relay as ${role}...`, 'msg-info');
    log(`URL: ${url}`, 'msg-sys');
    setStatus('Connecting...', 'connecting');

    ws = new WebSocket(url);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      log('WebSocket opened — relay accepted connection', 'msg-info');
      setStatus('Waiting for partner...', 'waiting');
      setTransport('relay');
      startHeartbeat();
      btnSend.disabled = false;
      if (role === 'captain') btnDisconnectHost.disabled = false;
      else btnDisconnectJoin.disabled = false;
    };

    ws.onmessage = (e) => {
      handleMessage(e.data, 'relay');
    };

    ws.onerror = () => {
      log('WebSocket error', 'msg-err');
    };

    ws.onclose = (e) => {
      log(`WebSocket closed (code=${e.code}, reason="${e.reason || 'none'}")`, 'msg-err');
      if (statusEl.textContent === 'Connecting...') {
        log('Connection rejected by relay — WebSocket never opened', 'msg-err');
        log('This usually means auth is required. Deploy relay worker with optional auth.', 'msg-err');
      }
      // Only set disconnected if P2P is not active
      if (transport !== 'p2p') {
        setStatus('Disconnected', 'disconnected');
        setTransport('none');
        stopHeartbeat();
        btnSend.disabled = true;
        btnP2P.disabled = true;
      } else {
        log('Relay dropped but P2P still active', 'msg-info');
      }
      btnDisconnectHost.disabled = true;
      btnDisconnectJoin.disabled = true;
      ws = null;
    };
  }

  // ── Message handler (shared by relay and P2P) ───────────────
  function handleMessage(data, source) {
    if (data instanceof ArrayBuffer) {
      const bytes = new Uint8Array(data);
      if (bytes.length === 0) return;
      if (bytes[0] === MSG_HEARTBEAT) {
        if (bytes.length >= 2 && bytes[1] === 0x01) {
          const ping = (performance.now() - lastPingTime).toFixed(0);
          pingEl.textContent = `${ping}ms (${transport})`;
        } else {
          send(new Uint8Array([MSG_HEARTBEAT, 0x01]));
        }
        return;
      }
      msgCount++;
      log(`[${source}] Binary received (${bytes.length}B, type=0x${bytes[0].toString(16).padStart(2,'0')}) #${msgCount}`, 'msg-recv');
    } else {
      try {
        const parsed = typeof data === 'string' ? JSON.parse(data) : data;
        if (parsed.type === 'partner-ready') {
          partnerConnected = true;
          log(`[${source}] Partner connected (${parsed.role})`, 'msg-recv');
          setStatus('Connected', 'connected');
          btnP2P.disabled = false;
          log('P2P upgrade available — click "Upgrade to P2P" to test', 'msg-p2p');
        } else if (parsed.type === 'waiting') {
          log(`[${source}] Room confirmed — waiting for partner`, 'msg-recv');
        } else if (parsed.type === 'disconnect') {
          partnerConnected = false;
          log(`[${source}] Partner disconnected (${parsed.role})`, 'msg-err');
          setStatus('Partner left', 'waiting');
          btnP2P.disabled = true;
        } else if (parsed.type === 'relay') {
          msgCount++;
          log(`[${source}] Relay data (${parsed.data.length}B) #${msgCount}`, 'msg-recv');
        } else {
          log(`[${source}] JSON: ${JSON.stringify(parsed)}`, 'msg-recv');
        }
      } catch (_) {
        log(`[${source}] Text: ${data}`, 'msg-recv');
      }
    }
  }

  // ── PeerJS P2P Upgrade ──────────────────────────────────────
  async function attemptP2P() {
    if (!roomCode || !role) return;
    if (transport === 'p2p') { log('Already on P2P', 'msg-p2p'); return; }

    const peerId = roomCode + '-' + role;
    const partnerPeerId = roomCode + '-' + (role === 'captain' ? 'stoker' : 'captain');

    log(`P2P: Registering as ${peerId}...`, 'msg-p2p');

    // Fetch TURN credentials
    let iceServers = [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ];
    try {
      const resp = await fetch(TURN_CREDENTIALS_URL);
      const data = await resp.json();
      if (data.iceServers) {
        const turn = Array.isArray(data.iceServers) ? data.iceServers : [data.iceServers];
        iceServers = [...iceServers, ...turn];
        log(`P2P: Fetched TURN credentials (${turn.length} server(s))`, 'msg-p2p');
      }
    } catch (e) {
      log('P2P: TURN fetch failed, using STUN only', 'msg-err');
    }

    // Clean up existing peer
    if (peer) { try { peer.destroy(); } catch (_) {} peer = null; }

    peer = new window.Peer(peerId, {
      host: PEERJS_HOST,
      port: PEERJS_PORT,
      path: PEERJS_PATH,
      secure: PEERJS_SECURE,
      config: { iceServers }
    });

    peer.on('open', (id) => {
      log(`P2P: Registered with signaling server as ${id}`, 'msg-p2p');
      if (role === 'stoker') {
        log(`P2P: Initiating data channel to ${partnerPeerId}...`, 'msg-p2p');
        const conn = peer.connect(partnerPeerId, { reliable: true, serialization: 'binary' });
        setupP2PConn(conn);
      } else {
        log('P2P: Waiting for stoker to initiate data channel...', 'msg-p2p');
      }
    });

    peer.on('connection', (conn) => {
      log(`P2P: Incoming data channel from ${conn.peer}`, 'msg-p2p');
      setupP2PConn(conn);
    });

    peer.on('error', (err) => {
      if (err.type === 'unavailable-id') {
        log('P2P: Peer ID already in use — try disconnecting and reconnecting', 'msg-err');
      } else if (err.type === 'peer-unavailable') {
        log('P2P: Partner not registered yet — they need to click "Upgrade to P2P" too', 'msg-err');
      } else {
        log(`P2P: Error — ${err.type}: ${err.message}`, 'msg-err');
      }
    });

    peer.on('disconnected', () => {
      log('P2P: Signaling server disconnected', 'msg-err');
    });

    // Timeout
    setTimeout(() => {
      if (transport !== 'p2p') {
        log('P2P: Upgrade timed out after 15s — staying on relay', 'msg-err');
      }
    }, 15000);
  }

  function setupP2PConn(conn) {
    p2pConn = conn;

    conn.on('open', () => {
      log('P2P: Data channel OPEN — upgraded to P2P!', 'msg-p2p');
      setStatus('Connected (P2P)', 'p2p');
      setTransport('p2p');
      btnSend.disabled = false;
    });

    conn.on('data', (data) => {
      handleMessage(data, 'p2p');
    });

    conn.on('close', () => {
      log('P2P: Data channel closed', 'msg-err');
      if (ws && ws.readyState === WebSocket.OPEN) {
        log('Falling back to relay', 'msg-info');
        setTransport('relay');
        setStatus('Connected', 'connected');
      } else {
        setTransport('none');
        setStatus('Disconnected', 'disconnected');
        btnSend.disabled = true;
      }
      p2pConn = null;
    });

    conn.on('error', (err) => {
      log(`P2P: Connection error — ${err}`, 'msg-err');
    });
  }

  // ── Heartbeat ───────────────────────────────────────────────
  function startHeartbeat() {
    stopHeartbeat();
    heartbeatInterval = setInterval(() => {
      lastPingTime = performance.now();
      send(new Uint8Array([MSG_HEARTBEAT, 0x00]));
    }, 2000);
  }

  function stopHeartbeat() {
    if (heartbeatInterval) {
      clearInterval(heartbeatInterval);
      heartbeatInterval = null;
    }
  }

  // ── Disconnect ──────────────────────────────────────────────
  function disconnectAll() {
    stopHeartbeat();
    if (p2pConn) { try { p2pConn.close(); } catch (_) {} p2pConn = null; }
    if (peer) { try { peer.destroy(); } catch (_) {} peer = null; }
    if (ws) { try { ws.close(); } catch (_) {} ws = null; }
    transport = 'none';
    partnerConnected = false;
    pingEl.textContent = '';
    transportEl.innerHTML = '';
    btnSend.disabled = true;
    btnP2P.disabled = true;
    btnDisconnectHost.disabled = true;
    btnDisconnectJoin.disabled = true;
    setStatus('Disconnected', 'disconnected');
  }

  // ── Button handlers ─────────────────────────────────────────
  btnCreate.addEventListener('click', () => {
    const code = generateRoomCode();
    hostRoomCode.innerHTML = `<div class="room-code">${code}</div>`;
    joinCodeInput.value = code;
    log(`Created room: ${code}`, 'msg-info');
    connectRelay(code, 'captain');
  });

  btnJoin.addEventListener('click', () => {
    let code = joinCodeInput.value.trim().toUpperCase();
    if (!code) { log('Enter a room code', 'msg-err'); return; }
    if (!code.startsWith('TNDM-')) code = 'TNDM-' + code;
    log(`Joining room: ${code}`, 'msg-info');
    connectRelay(code, 'stoker');
  });

  joinCodeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') btnJoin.click();
  });

  btnSend.addEventListener('click', () => {
    const testMsg = new Uint8Array([0xFF, 0x01, 0x02, 0x03]);
    if (send(testMsg)) {
      log(`Sent test message via ${transport} (${testMsg.length} bytes)`, 'msg-sent');
    } else {
      log('Send failed — no active connection', 'msg-err');
    }
  });

  btnP2P.addEventListener('click', () => {
    attemptP2P();
  });

  btnDisconnectHost.addEventListener('click', () => {
    log('Disconnecting...', 'msg-info');
    disconnectAll();
  });
  btnDisconnectJoin.addEventListener('click', () => {
    log('Disconnecting...', 'msg-info');
    disconnectAll();
  });

  btnClear.addEventListener('click', () => {
    logEl.innerHTML = '';
    msgCount = 0;
    pingEl.textContent = '';
  });

  log('Relay + P2P test ready. Create a room in one tab, join from another.', 'msg-sys');
  log(`Relay: ${RELAY_URL}`, 'msg-sys');
  log(`PeerJS: ${PEERJS_HOST}:${PEERJS_PORT}`, 'msg-sys');
</script>
</body>
</html>
